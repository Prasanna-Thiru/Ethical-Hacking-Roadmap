<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a" />
      <stop offset="50%" stop-color="#070a14" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>

    <!-- Cyan Glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Green Glow -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Sleek Tech Grid Pattern -->
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1e293b" opacity="0.6"/>
    </pattern>

    <!-- Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#39FF14" />
    </linearGradient>

    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes float-slow {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    @keyframes rotate-hud {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes rotate-hud-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pulse-soft {
      0% { opacity: 0.4; }
      50% { opacity: 0.9; }
      100% { opacity: 0.4; }
    }

    @keyframes scan-horizontal {
      0% { left: 0%; }
      50% { left: 100%; }
      100% { left: 0%; }
    }

    @keyframes dash-flow {
      to {
        stroke-dashoffset: -40;
      }
    }

    .floater {
      animation: float-slow 6s ease-in-out infinite;
      transform-origin: center;
    }

    .hud-rotate {
      animation: rotate-hud 25s linear infinite;
      transform-origin: 140px 160px;
    }

    .hud-rotate-rev {
      animation: rotate-hud-reverse 15s linear infinite;
      transform-origin: 140px 160px;
    }

    .pulse {
      animation: pulse-soft 3s ease-in-out infinite;
    }

    .flow-line {
      stroke-dasharray: 8, 12;
      animation: dash-flow 2s linear infinite;
    }

    .title-main {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      fill: #ffffff;
    }

    .title-sub {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #00FFFF;
      letter-spacing: 5px;
    }

    .tech-mono {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      fill: #64748b;
    }
  </style>

  <!-- Rich Background -->
  <rect width="850" height="320" fill="url(#bg-grad)" />
  <rect width="850" height="320" fill="url(#dot-grid)" />

  <!-- Diagonal Tech Partition -->
  <path d="M 0,0 L 520,0 L 420,320 L 0,320 Z" fill="#0f172a" fill-opacity="0.3" />
  
  <!-- Subtle Glowing Tech Accent Lines -->
  <line x1="520" y1="0" x2="420" y2="320" stroke="#00FFFF" stroke-width="1.5" opacity="0.3" />
  <line x1="535" y1="0" x2="435" y2="320" stroke="#39FF14" stroke-width="1.5" opacity="0.15" />

  <!-- Left Side: Interactive 3D Cyber Shield HUD -->
  <g class="floater">
    <!-- Inner Cyber Rings -->
    <circle cx="140" cy="160" r="85" fill="none" stroke="#1e293b" stroke-width="1" />
    <circle class="hud-rotate" cx="140" cy="160" r="75" fill="none" stroke="#00FFFF" stroke-width="1" stroke-dasharray="10, 40, 90, 20" opacity="0.5" filter="url(#glow-cyan)" />
    <circle class="hud-rotate-rev" cx="140" cy="160" r="65" fill="none" stroke="#39FF14" stroke-width="1.5" stroke-dasharray="30, 15, 10, 30" opacity="0.4" filter="url(#glow-green)" />
    
    <!-- 3D Layered Cyber Shield Symbol -->
    <path d="M 140,110 C 145,110 170,120 175,125 C 175,150 170,185 140,205 C 110,185 105,150 105,125 C 110,120 135,110 140,110 Z" 
          fill="url(#shield-grad)" stroke="url(#primary-grad)" stroke-width="2.5" filter="url(#glow-cyan)" />
          
    <path d="M 140,122 C 143,122 160,130 163,134 C 163,152 159,178 140,193 C 121,178 117,152 117,134 C 120,130 137,122 140,122 Z" 
          fill="none" stroke="#39FF14" stroke-width="1" stroke-dasharray="5, 3" opacity="0.6" />

    <!-- Padlock Icon inside Shield -->
    <rect x="131" y="152" width="18" height="14" rx="2" fill="none" stroke="#ffffff" stroke-width="2" />
    <path d="M 135,152 L 135,145 C 135,142 145,142 145,145 L 145,152" fill="none" stroke="#ffffff" stroke-width="2" />
  </g>

  <!-- Central & Right Content Panel -->
  <!-- Top Tech Metadata -->
  <g transform="translate(280, 70)">
    <text class="tech-mono" x="0" y="0">SYSTEM STATUS: <tspan fill="#39FF14">SECURE</tspan></text>
    <text class="tech-mono" x="180" y="0">ENGAGEMENT: <tspan fill="#00FFFF">OFFENSIVE</tspan></text>
    <text class="tech-mono" x="370" y="0">TARGET LEVEL: <tspan fill="#ffffff">L3_ROADMAP</tspan></text>
    <line x1="0" y1="12" x2="480" y2="12" stroke="#1e293b" stroke-width="1" />
    <line class="flow-line" x1="0" y1="12" x2="480" y2="12" stroke="#00FFFF" stroke-width="1" opacity="0.4" />
  </g>

  <!-- Main Headline -->
  <g transform="translate(280, 130)">
    <text class="title-sub" x="0" y="0" font-size="12">12-WEEK MASTERY PATHWAY</text>
    <text class="title-main" x="0" y="38" font-size="36" letter-spacing="-0.5">Ethical Hacking Roadmap</text>
    <text class="title-main" x="382" y="38" font-size="36" fill="#39FF14" filter="url(#glow-green)">.</text>
    <text font-family="sans-serif" font-size="14" fill="#94a3b8" x="0" y="62">
      A systematic guide to network penetration, web exploitation, and red teaming.
    </text>
  </g>

  <!-- Bottom Interactive Status Bar / Progress Indicator -->
  <g transform="translate(280, 225)">
    <!-- Week Progress Marks -->
    <rect x="0" y="10" width="480" height="8" rx="4" fill="#1e293b" />
    <!-- Glowing filled track -->
    <rect x="0" y="10" width="360" height="8" rx="4" fill="url(#primary-grad)" filter="url(#glow-cyan)" opacity="0.8" />
    
    <!-- Pulse nodes on progress bar -->
    <circle cx="120" cy="14" r="5" fill="#00FFFF" />
    <circle cx="240" cy="14" r="5" fill="#00FFFF" />
    <circle cx="360" cy="14" r="5" fill="#39FF14" class="pulse" />
    
    <text class="tech-mono" x="0" y="32">WEEK 1</text>
    <text class="tech-mono" x="110" y="32">WEEK 4</text>
    <text class="tech-mono" x="230" y="32">WEEK 8</text>
    <text class="tech-mono" x="345" y="32" fill="#39FF14">WEEK 12</text>

    <!-- Right Side HUD data -->
    <text class="tech-mono" x="430" y="32" fill="#94a3b8">REV: 2.1.0</text>
  </g>

  <!-- Border Frame -->
  <rect x="10" y="10" width="830" height="300" rx="8" fill="none" stroke="#1e293b" stroke-width="1.5" />
  <!-- Corner Tech Highlights -->
  <path d="M 8 30 L 8 8 L 30 8" fill="none" stroke="#00FFFF" stroke-width="2" />
  <path d="M 842 30 L 842 8 L 820 8" fill="none" stroke="#00FFFF" stroke-width="2" />
  <path d="M 8 290 L 8 312 L 30 312" fill="none" stroke="#00FFFF" stroke-width="2" />
  <path d="M 842 290 L 842 312 L 820 312" fill="none" stroke="#00FFFF" stroke-width="2" />
</svg>
