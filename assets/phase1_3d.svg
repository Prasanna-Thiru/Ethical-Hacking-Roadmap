<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="100%" height="100%">
  <defs>
    <!-- Green Glow Filter -->
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { opacity: 0.3; }
    }

    @keyframes packet-run {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }

    .floater {
      animation: float 5s ease-in-out infinite;
      transform-origin: center;
    }

    .pulser {
      animation: pulse 2.5s ease-in-out infinite;
    }

    .packet-line {
      stroke-dasharray: 6, 18;
      animation: packet-run 1.5s linear infinite;
    }

    .title-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #39FF14;
    }

    .info-text {
      font-family: sans-serif;
      font-size: 11px;
      fill: #8a9ba8;
    }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#070a13" rx="10" stroke="#162238" stroke-width="1.5" />

  <!-- Animated Grid Overlay -->
  <g opacity="0.15">
    <path d="M 0,40 L 400,40 M 0,80 L 400,80 M 0,120 L 400,120 M 0,160 L 400,160 M 0,200 L 400,200" stroke="#162238" stroke-width="1" />
    <path d="M 40,0 L 40,240 M 80,0 L 80,240 M 120,0 L 120,240 M 160,0 L 160,240 M 200,0 L 200,240 M 240,0 L 240,240 M 280,0 L 280,240 M 320,0 L 320,240 M 360,0 L 360,240" stroke="#162238" stroke-width="1" />
  </g>

  <!-- Glowing Corner Borders -->
  <path d="M 0 20 L 0 0 L 20 0" fill="none" stroke="#39FF14" stroke-width="2" />
  <path d="M 380 0 L 400 0 L 400 20" fill="none" stroke="#39FF14" stroke-width="2" />
  <path d="M 0 220 L 0 240 L 20 240" fill="none" stroke="#39FF14" stroke-width="2" />
  <path d="M 380 240 L 400 240 L 400 220" fill="none" stroke="#39FF14" stroke-width="2" />

  <!-- Floating Group -->
  <g class="floater">
    
    <!-- 3D Isometric Platform -->
    <!-- Top Face -->
    <polygon points="200,110 280,140 200,170 120,140" fill="#142c16" stroke="#39FF14" stroke-width="1.5" filter="url(#glow-green)" />
    <!-- Left Face -->
    <polygon points="120,140 200,170 200,185 120,155" fill="#0d1b10" stroke="#39FF14" stroke-width="1.5" />
    <!-- Right Face -->
    <polygon points="200,170 280,140 280,155 200,185" fill="#09140b" stroke="#39FF14" stroke-width="1.5" />

    <!-- Connection Line to Floating HUD -->
    <line x1="200" y1="140" x2="200" y2="70" stroke="#39FF14" stroke-width="1" opacity="0.5" stroke-dasharray="2,2" />
    
    <!-- Holographic Floating Card -->
    <g transform="translate(130, 45)">
      <!-- Outer Border -->
      <rect width="140" height="45" rx="4" fill="#0a1410" fill-opacity="0.9" stroke="#39FF14" stroke-width="1" filter="url(#glow-green)" opacity="0.8" />
      
      <!-- Inside Icons (Linux Terminal & Code Symbol) -->
      <path d="M 12 12 L 20 18 L 12 24" fill="none" stroke="#39FF14" stroke-width="1.5" />
      <line x1="22" y1="24" x2="30" y2="24" stroke="#39FF14" stroke-width="1.5" />
      
      <!-- Text details -->
      <text x="38" y="20" font-family="monospace" font-weight="bold" font-size="9" fill="#39FF14">LINUX SETUP</text>
      <text x="38" y="32" font-family="monospace" font-size="8" fill="#8a9ba8">NET_BASICS : OK</text>
    </g>

    <!-- Animated Data Stream to the side -->
    <path class="packet-line" d="M 100,150 L 120,140 L 200,110 L 280,140 L 300,150" fill="none" stroke="#39FF14" stroke-width="1.5" />

    <!-- Small floating helper nodes -->
    <circle class="pulser" cx="100" cy="150" r="3" fill="#39FF14" filter="url(#glow-green)" />
    <circle class="pulser" cx="300" cy="150" r="3" fill="#39FF14" filter="url(#glow-green)" />
  </g>

  <!-- Title Header -->
  <text x="20" y="30" class="title-text" font-size="14" letter-spacing="1">PHASE 1: FOUNDATIONS</text>
  <text x="20" y="48" class="title-text" font-size="10" fill="#8a9ba8">WEEKS 1 - 4</text>

  <!-- Key Learnings Checklist -->
  <g transform="translate(20, 195)">
    <text class="info-text" x="0" y="0">• Linux File Systems &amp; Privilege Escalation</text>
    <text class="info-text" x="0" y="15">• Networking Deep-Dives (OSI &amp; Wireshark)</text>
    <text class="info-text" x="0" y="30">• Bash Scripting &amp; Port Scanning (Nmap)</text>
  </g>

  <!-- Tech Indicator -->
  <rect x="300" y="20" width="80" height="15" rx="3" fill="#0f1912" stroke="#39FF14" stroke-width="0.5" />
  <text x="340" y="31" text-anchor="middle" font-family="monospace" font-size="8" fill="#39FF14" font-weight="bold">LVL: BASELINE</text>
</svg>
